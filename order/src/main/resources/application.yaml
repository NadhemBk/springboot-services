spring:
  application:
    name: order
  datasource:
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  feign:
    client:
      config:
        default:
          connectTimeout: 2000
          readTimeout: 5000
